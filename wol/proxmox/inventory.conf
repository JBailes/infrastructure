#!/usr/bin/env bash
# WOL Infrastructure Inventory
# Sourced by pve-create-hosts.sh, pve-deploy.sh, and pve-audit-hosts.sh
#
# Format: HOSTS is a bash array. Each element is a pipe-delimited record:
#   name|ctid|type|ip|bridge_int|bridge_ext|privileged|disk_gb|ram_mb|cores|ext_ip|test_ip|notes
#
# type: lxc or vm
# bridge_int: Proxmox bridge for the prod/shared network (vmbr1, 10.0.0.0/24)
# bridge_ext: Proxmox bridge for the external network (vmbr0, empty if not public-facing)
# privileged: yes or no (LXC only; ignored for VMs)
# ext_ip: external IP for public-facing hosts (empty if not public-facing)
# test_ip: IP on the test bridge (vmbr3, 10.0.1.0/24). Non-empty for shared hosts
#          that need to be reachable from both prod and test environments.
#          Empty for prod-only or test-only hosts.

PROD_NET="10.0.0.0/24"
TEST_NET="10.0.1.0/24"
PROD_BRIDGE="vmbr1"
TEST_BRIDGE="vmbr3"
BOOTSTRAP_GW="10.0.0.200"      # Initial default route for prod/shared containers (wol-gateway-a).
                               # Bootstrap scripts replace this with ECMP dual-gateway route.
BOOTSTRAP_GW_TEST="10.0.1.200" # Initial default route for test containers.
PUBLIC_BRIDGE="vmbr0"
IMAGE_STORAGE="${IMAGE_STORAGE:-isos}"                # Proxmox storage for templates and ISOs
TEMPLATE_LXC="${IMAGE_STORAGE}:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
TEMPLATE_VM_CLOUD_IMG="/mnt/pve/${IMAGE_STORAGE}/template/iso/debian-13-genericcloud-amd64.qcow2"  # Downloaded once, see README
SSH_PUBLIC_KEY="/root/.ssh/id_ed25519.pub"
EXTERNAL_GW="192.168.1.1"      # External network router
BOOTSTRAP_DIR="${BOOTSTRAP_DIR:-$(cd "$(dirname "${BASH_SOURCE[0]}")/../bootstrap" && pwd)}"  # Auto-detected, override with env var
STORAGE="${STORAGE:-fast}"       # Proxmox storage pool for container/VM disks (override with env var)
EXTERNAL_CIDR=24
DEFAULT_DISK_GB=8
DEFAULT_RAM_MB=512
DEFAULT_CORES=1

# Static CTID allocation: CTIDs are assigned in bootstrap order.
# IPs follow the X.X.X.{CTID} convention on all networks.
# WOL range: 200-239. ACK range: 240-254. Homelab: per-host static.
CTID_RANGE_START=200

HOSTS=(
    # Shared infrastructure (CTIDs 200-209)
    # Shared hosts are dual-homed on vmbr1 (prod) + vmbr3 (test) so both
    # environments can reach them directly without gateway routing.
    # apt-cache (10.0.0.115) and obs (10.0.0.100) are managed by homelab, not WOL.
    # The WOL orchestrator auto-configures apt proxy if apt-cache is reachable.
    # obs must be deployed before WOL Promtail steps.
    #
    # Gateways are tri-homed: vmbr0 (external) + vmbr1 (prod) + vmbr3 (test).
    # They provide NAT for both subnets but do NOT route between them.
    "wol-gateway-a|200|lxc|10.0.0.200|${PROD_BRIDGE}|${PUBLIC_BRIDGE}|yes|8|512|1|192.168.1.200|10.0.1.200|NAT gateway A"
    "wol-gateway-b|201|lxc|10.0.0.201|${PROD_BRIDGE}|${PUBLIC_BRIDGE}|yes|8|512|1|192.168.1.201|10.0.1.201|NAT gateway B"
    "spire-db|202|lxc|10.0.0.202|${PROD_BRIDGE}||no|32|1024|2||10.0.1.202|PostgreSQL (SPIRE) + Tang"
    "ca|203|lxc|10.0.0.203|${PROD_BRIDGE}||no|8|512|1||10.0.1.203|cfssl intermediate CA"
    "spire-server|204|vm|10.0.0.204|${PROD_BRIDGE}||no|16|2048|2||10.0.1.204|SPIRE Server (needs secondary disk)"
    "provisioning|205|lxc|10.0.0.205|${PROD_BRIDGE}||no|4|256|1|||vTPM Provisioning CA"
    "wol-accounts-db|206|lxc|10.0.0.206|${PROD_BRIDGE}||no|32|1024|1||10.0.1.206|PostgreSQL (wol-accounts)"
    "wol-accounts|207|lxc|10.0.0.207|${PROD_BRIDGE}||yes|8|512|1||10.0.1.207|Accounts API + SPIRE Agent"
    "wol-a|208|lxc|10.0.0.208|${PROD_BRIDGE}|${PUBLIC_BRIDGE}|yes|8|512|2|192.168.1.208|10.0.1.208|Connection interface + SPIRE Agent"
    "wol-web|209|lxc|10.0.0.209|${PROD_BRIDGE}||no|16|1024|2||10.0.1.209|WOL web frontend (ackmud.com)"

    # Prod environment (CTIDs 210-214, vmbr1 only)
    "wol-realm-prod|210|lxc|10.0.0.210|${PROD_BRIDGE}||yes|8|1024|2|||Game engine + SPIRE Agent (prod)"
    "wol-world-prod|211|lxc|10.0.0.211|${PROD_BRIDGE}||yes|8|512|1|||World API + SPIRE Agent (prod)"
    "wol-ai-prod|212|lxc|10.0.0.212|${PROD_BRIDGE}||yes|8|512|1|||AI service + SPIRE Agent (prod)"
    "wol-world-db-prod|213|lxc|10.0.0.213|${PROD_BRIDGE}||no|32|1024|1|||PostgreSQL world (prod)"
    "wol-realm-db-prod|214|lxc|10.0.0.214|${PROD_BRIDGE}||no|32|1024|1|||PostgreSQL realm (prod)"

    # Test environment (CTIDs 215-219, vmbr3 only)
    "wol-realm-test|215|lxc|10.0.1.215|${TEST_BRIDGE}||yes|8|1024|2|||Game engine + SPIRE Agent (test)"
    "wol-world-test|216|lxc|10.0.1.216|${TEST_BRIDGE}||yes|8|512|1|||World API + SPIRE Agent (test)"
    "wol-ai-test|217|lxc|10.0.1.217|${TEST_BRIDGE}||yes|8|512|1|||AI service + SPIRE Agent (test)"
    "wol-world-db-test|218|lxc|10.0.1.218|${TEST_BRIDGE}||no|32|1024|1|||PostgreSQL world (test)"
    "wol-realm-db-test|219|lxc|10.0.1.219|${TEST_BRIDGE}||no|32|1024|1|||PostgreSQL realm (test)"
)

# Environment definitions: maps environment name to host name suffixes.
# Per-env hosts are named <service>-<env>, e.g. wol-realm-prod, wol-realm-test.
ENVIRONMENTS=("prod" "test")

# Shared hosts (no environment suffix)
SHARED_HOSTS=(
    "wol-gateway-a" "wol-gateway-b" "spire-server" "ca"
    "provisioning" "wol-accounts" "wol-accounts-db" "spire-db" "wol-a" "wol-web"
)

# Per-environment service base names (suffixed with -prod, -test, etc.)
PER_ENV_SERVICES=("wol-realm" "wol-world" "wol-world-db" "wol-ai" "wol-realm-db")

# External hosts: managed by homelab, not created or destroyed by WOL scripts.
# The WOL orchestrator deploys Promtail and enrolls certs on these hosts.
# Same pipe-delimited format as HOSTS.
EXTERNAL_HOSTS=(
    "obs|100|lxc|10.0.0.100|${PROD_BRIDGE}|${PUBLIC_BRIDGE}|no|64|2048|2|192.168.1.100||Observability stack (homelab-managed)"
)

# ---------------------------------------------------------------------------
# Bootstrap sequences -- separate sequences for shared, prod, and test.
# Run shared first, then deploy environments independently.
#
# Usage:
#   ./pve-deploy.sh              # Shared infrastructure only
#   ./pve-deploy.sh --env prod   # Prod environment only (shared must be up)
#   ./pve-deploy.sh --env test   # Test environment only (shared must be up)
#   ./pve-deploy.sh --all        # Shared + prod + test
# ---------------------------------------------------------------------------

BOOTSTRAP_SHARED=(
    "00|wol-gateway-a|00-setup-gateway.sh|GW_NAME=wol-gateway-a GW_IP=10.0.0.200 GW_IP_TEST=10.0.1.200"
    "00|wol-gateway-b|00-setup-gateway.sh|GW_NAME=wol-gateway-b GW_IP=10.0.0.201 GW_IP_TEST=10.0.1.201"
    "01|spire-db|02-setup-spire-db.sh|"
    "01|wol-accounts-db|02-setup-wol-accounts-db.sh|"
    "02|ca|03-setup-ca.sh|"
    "03|spire-server|04-setup-spire-server.sh|"
    "04|provisioning|05-setup-provisioning-host.sh|"
    "05|ca|06-complete-ca.sh|"
    "05|spire-db|enroll-host-certs.sh|"
    "05|wol-accounts-db|enroll-host-certs.sh|"
    "06|spire-server|07-complete-spire-server.sh|"
    "07|provisioning|08-complete-provisioning.sh|"
    "08|wol-accounts|09-setup-spire-agent.sh|"
    "08|wol-a|09-setup-spire-agent.sh|"
    "09|wol-accounts|10-setup-wol-accounts.sh|"
    "14|wol-a|15-setup-wol.sh|WOL_NAME=wol-a WOL_IP=10.0.0.208"
    # obs is managed by homelab (03-setup-obs.sh). Must be deployed before Promtail steps.
    "16|wol-web|18-setup-wol-web.sh|"
    "18|wol-accounts|19-setup-promtail.sh|"
    "18|wol-a|19-setup-promtail.sh|"
    "18|wol-web|19-setup-promtail.sh|"
    "18|spire-db|19-setup-promtail.sh|"
    "18|wol-accounts-db|19-setup-promtail.sh|"
    "18|spire-server|19-setup-promtail.sh|"
    "18|ca|19-setup-promtail.sh|"
    "18|obs|19-setup-promtail.sh|"
    # Step 19: enroll Promtail certs on all hosts (CA is up from step 05)
    "19|wol-accounts|enroll-host-certs.sh|"
    "19|wol-a|enroll-host-certs.sh|"
    "19|wol-web|enroll-host-certs.sh|"
    "19|spire-db|enroll-host-certs.sh|"
    "19|wol-accounts-db|enroll-host-certs.sh|"
    "19|spire-server|enroll-host-certs.sh|"
    "19|ca|enroll-host-certs.sh|"
    "19|obs|enroll-host-certs.sh|"
)

BOOTSTRAP_PROD=(
    "09|wol-realm-prod|09-setup-spire-agent.sh|"
    "09|wol-world-prod|09-setup-spire-agent.sh|"
    "09|wol-ai-prod|09-setup-spire-agent.sh|"
    "10|spire-server|prod/11-register-workload-entries-prod.sh|"
    "11|wol-world-db-prod|prod/12-setup-wol-world-db-prod.sh|"
    "11|wol-realm-db-prod|prod/12-setup-wol-realm-db-prod.sh|"
    "12|wol-world-prod|prod/13-setup-wol-world-prod.sh|"
    "13|wol-realm-prod|prod/14-setup-wol-realm-prod.sh|"
    "15|wol-ai-prod|prod/16-setup-wol-ai-prod.sh|"
    "18|wol-realm-prod|19-setup-promtail.sh|"
    "18|wol-world-prod|19-setup-promtail.sh|"
    "18|wol-world-db-prod|19-setup-promtail.sh|"
    "18|wol-realm-db-prod|19-setup-promtail.sh|"
    "18|wol-ai-prod|19-setup-promtail.sh|"
    "19|wol-realm-prod|enroll-host-certs.sh|"
    "19|wol-world-prod|enroll-host-certs.sh|"
    "19|wol-world-db-prod|enroll-host-certs.sh|"
    "19|wol-realm-db-prod|enroll-host-certs.sh|"
    "19|wol-ai-prod|enroll-host-certs.sh|"
)

BOOTSTRAP_TEST=(
    "09|wol-realm-test|09-setup-spire-agent.sh|"
    "09|wol-world-test|09-setup-spire-agent.sh|"
    "09|wol-ai-test|09-setup-spire-agent.sh|"
    "10|spire-server|test/11-register-workload-entries-test.sh|"
    "11|wol-world-db-test|test/12-setup-wol-world-db-test.sh|"
    "11|wol-realm-db-test|test/12-setup-wol-realm-db-test.sh|"
    "12|wol-world-test|test/13-setup-wol-world-test.sh|"
    "13|wol-realm-test|test/14-setup-wol-realm-test.sh|"
    "15|wol-ai-test|test/16-setup-wol-ai-test.sh|"
    "18|wol-realm-test|19-setup-promtail.sh|"
    "18|wol-world-test|19-setup-promtail.sh|"
    "18|wol-world-db-test|19-setup-promtail.sh|"
    "18|wol-realm-db-test|19-setup-promtail.sh|"
    "18|wol-ai-test|19-setup-promtail.sh|"
    "19|wol-realm-test|enroll-host-certs.sh|"
    "19|wol-world-test|enroll-host-certs.sh|"
    "19|wol-world-db-test|enroll-host-certs.sh|"
    "19|wol-realm-db-test|enroll-host-certs.sh|"
    "19|wol-ai-test|enroll-host-certs.sh|"
)

# Legacy combined sequence for backward compatibility (used by --host filter).
# Assembled from the three separate sequences above.
BOOTSTRAP_SEQUENCE=("${BOOTSTRAP_SHARED[@]}" "${BOOTSTRAP_PROD[@]}" "${BOOTSTRAP_TEST[@]}")

# Proxmox boot ordering for automated power-cycle recovery.
# Format: name|startup_order|startup_delay
BOOT_ORDER=(
    "wol-gateway-a|1|3"
    "wol-gateway-b|1|3"
    "spire-db|2|5"
    "wol-accounts-db|2|5"
    "spire-server|3|15"
    "ca|4|30"
    "provisioning|4|30"
    "wol-world-db-prod|5|45"
    "wol-world-db-test|5|45"
    "wol-realm-db-prod|5|45"
    "wol-realm-db-test|5|45"
    # obs boot order is managed by Proxmox directly (CTID 100, homelab-managed)
    "wol-accounts|6|60"
    "wol-world-prod|6|60"
    "wol-world-test|6|60"
    "wol-ai-prod|6|60"
    "wol-ai-test|6|60"
    "wol-realm-prod|7|75"
    "wol-realm-test|7|75"
    "wol-a|8|90"
    "wol-web|8|90"
)
