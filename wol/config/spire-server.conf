server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    trust_domain = "wol"
    data_dir     = "/var/lib/spire/server"
    log_level    = "INFO"
    log_file     = "/var/log/spire/server.log"

    # Intermediate CA lifetime: 1 week (auto-rotated by SPIRE under the UpstreamAuthority)
    ca_ttl = "168h"

    # Service SVIDs: 1 hour; renewed by agents at 50% (~30 min)
    default_x509_svid_ttl = "1h"

    # JWT-SVIDs: 5 minutes
    default_jwt_svid_ttl = "5m"

    ca_subject {
        country      = ["WOL"]
        organization = ["WOL Infrastructure"]
        common_name  = ""
    }
}

plugins {
    # -------------------------------------------------------------------------
    # Datastore -- PostgreSQL (not SQLite; required for warm standby)
    # Bootstrap circular dependency: SPIRE uses password auth here, NOT SVIDs.
    # The wol-accounts DB uses step-ca client certs; this DB uses a password.
    # -------------------------------------------------------------------------
    DataStore "sql" {
        plugin_data {
            database_type     = "postgres"
            connection_string = "host=10.0.0.202 port=5432 dbname=spire user=spire sslmode=require sslrootcert=/etc/spire/server/root_ca.crt password=SPIRE_DB_PASSWORD_PLACEHOLDER"
        }
    }

    # -------------------------------------------------------------------------
    # Key Manager -- disk, on LUKS-encrypted secondary virtual disk
    # The LUKS disk is mounted at /var/lib/spire/keys (auto-unlocked via Tang NBDE)
    # KeyManager "tpm" is NOT applicable here; requires physical TPM hardware
    # -------------------------------------------------------------------------
    KeyManager "disk" {
        plugin_data {
            keys_path = "/var/lib/spire/keys/server_keys.json"
        }
    }

    # -------------------------------------------------------------------------
    # Node Attestor -- join_token (transitional; in use until vTPM path is operational)
    #
    # To migrate to vTPM DevID attestation:
    #   1. Run 05-provision-vm-vtpm.sh on each VM
    #   2. Uncomment the tpm_devid block below and comment out join_token
    #   3. Restart SPIRE Server (existing agents continue until their SVIDs expire)
    # -------------------------------------------------------------------------
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # NodeAttestor "tpm_devid" {
    #     plugin_data {
    #         devid_ca_path = "/etc/spire/server/vtpm-provisioning-ca.crt"
    #     }
    # }

    # -------------------------------------------------------------------------
    # Upstream Authority -- WOL offline root CA (disk-based intermediate)
    # The intermediate_ca.crt + intermediate_ca.key were signed by the offline
    # root CA during bootstrap (see 00-offline-root-ca.md step 4).
    # -------------------------------------------------------------------------
    UpstreamAuthority "disk" {
        plugin_data {
            cert_file_path   = "/etc/spire/server/intermediate_ca.crt"
            key_file_path    = "/etc/spire/server/intermediate_ca.key"
            bundle_file_path = "/etc/spire/server/root_ca.crt"
        }
    }
}

health_checks {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = "8080"
    live_path        = "/live"
    ready_path       = "/ready"
}
